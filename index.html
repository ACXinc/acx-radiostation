<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACX Radio | DJ ADEM</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>ACX RADIO</h2>

        <nav>
            <div onclick="loadGenre('afro', event)" class="nav-item active">Afro House</div>
            <div onclick="loadGenre('tech', event)" class="nav-item">Tech House</div>
            <div onclick="loadGenre('edm', event)" class="nav-item">EDM</div>
            <div onclick="loadGenre('house', event)" class="nav-item">House</div>
            <div onclick="loadGenre('monthly', event)" class="nav-item highlight">🔥 Monthly</div>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <section class="hero">
            <div class="overlay"></div>
            <div class="hero-text">
                <h1>DJ ADEM</h1>
                <p>ACX RadioStation • Music Culture</p>
            </div>
        </section>

        <section class="content">
            <h2 id="title">Afro House</h2>
            <div id="grid" class="grid"></div>
        </section>

    </main>

</div>

<!-- 🎧 PLAYER -->
<div class="player">

    <div class="now-box">
        <div id="nowPlaying">No track selected</div>
    </div>

    <canvas id="visualizer"></canvas>

    <button onclick="togglePlay()" id="playBtn">▶</button>
</div>

<script src="app.js"></script>
</body>
</html>
