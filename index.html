<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACX RadioStation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
    <div class="logo">ACX RADIO</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Live</a>
        <a href="#">Mixes</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>🎧 ACX RadioStation</h1>
    <p>Live Tech House • EDM • DJ Adem Chebbi</p>

    <button id="playBtn">▶ Play Live</button>

    <div class="now-playing">
        <p>Now Playing</p>
        <h3 id="track">Waiting for stream...</h3>
    </div>
</section>

<!-- VISUALIZER -->
<section class="visualizer">
    <div id="bars" class="bars"></div>
</section>

<!-- MIXES -->
<section class="mixes">
    <h2>🔥 Latest Mixes</h2>

    <div class="mix-grid">
        <div class="mix-card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Tech House Vol.1</h3>
            <button>Play</button>
        </div>

        <div class="mix-card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Afro House Vibes</h3>
            <button>Play</button>
        </div>

        <div class="mix-card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>EDM Festival Mix</h3>
            <button>Play</button>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 ACX RadioStation — DJ Adem Chebbi</p>
</footer>

<script src="script.js"></script>
</body>
</html>
