<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACX RadioStation</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header>
    <div class="logo">ACX RADIO</div>
    <nav>
        <a href="#">Home</a>
        <a href="#live">Live</a>
        <a href="#mixes">Mixes</a>
    </nav>
</header>

<!-- HERO / LIVE -->
<section class="hero" id="live">
    <h1>🎧 ACX RadioStation</h1>
    <p>Live Tech House • EDM • DJ Adem Chebbi</p>

    <button id="playBtn">▶ Play Live</button>

    <div class="now-playing">
        <p>Status</p>
        <h3 id="track">🔴 Ready to stream</h3>
    </div>
</section>

<!-- VISUALIZER -->
<section class="visualizer">
    <div id="bars" class="bars"></div>
</section>

<!-- MIXES -->
<section class="mixes" id="mixes">
    <h2>🔥 DJ ADEM MIXES</h2>

    <div class="mix-grid">

        <div class="mix-card">
            <iframe src="https://www.youtube.com/embed/WScbRe-Si2U" allowfullscreen></iframe>
            <h3>Tech House Vol.1</h3>
        </div>

        <div class="mix-card">
            <iframe src="https://www.youtube.com/embed/BdnUKWpKwfY" allowfullscreen></iframe>
            <h3>Afro House Vol.1</h3>
        </div>

        <div class="mix-card">
            <iframe src="https://www.youtube.com/embed/16KcRDPQYdw" allowfullscreen></iframe>
            <h3>EDM Mix Vol.1</h3>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 ACX RadioStation — DJ Adem Chebbi</p>
</footer>

<script src="script.js"></script>
</body>
</html>
